# 本文件定义本地开发所需的 Docker 服务编排。
services:
  db:
    image: postgres:15-alpine
    container_name: chat-db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data